<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vulnerability Agent</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px;
      color: #1f2937;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
    }

    button {
      margin-top: 16px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .answer {
      margin-top: 24px;
      padding: 18px;
      background: #f9fafb;
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Vulnerability Analysis Agent</h1>

    <textarea id="question" placeholder="Ask something..."></textarea>
    <button onclick="askAgent()">Ask</button>

    <div id="result" class="answer" style="display:none;"></div>
  </div>

  <script>
    async function askAgent() {
      const question = document.getElementById("question").value;
      const resultBox = document.getElementById("result");

      if (!question.trim()) return;

      resultBox.style.display = "block";
      resultBox.textContent = "Analyzing...";

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });

      const data = await res.json();

      if (data.error) {
        resultBox.textContent = "Error: " + data.error;
        return;
      }

      resultBox.textContent =
        "Selected tool: " + data.tool + "\n\n" + data.answer;
    }
  </script>
</body>
</html>
